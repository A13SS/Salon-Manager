spring.application.name=Salon-Manager
# Puerto del servidor
server.port=8080

# Configuraciµn de MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/salon_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraciµn de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Configuraciµn de JWT
jwt.secret=SalonManager2026XyZ9abcDefGhiJklMnoPqrStuvWxYz1234567890AbCdEfGh
jwt.expiration=86400000

# Logs
logging.level.com.salon.manager=DEBUG
logging.level.org.springframework.security=DEBUG
